<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORD-plugg · Högskoleprovet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #232831;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --accent: #4f9eff;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --border: #2c3138;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.5;
  }
  .container { max-width: 760px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  h1 { font-size: 20px; font-weight: 600; }
  .stats {
    font-size: 14px;
    color: var(--muted);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 12px;
  }
  .correct-count { color: var(--correct); }
  .wrong-count { color: var(--wrong); }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .part-select {
    min-width: 190px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .word {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: #2a2f38;
  }
  .option:disabled { cursor: default; }

  /* ===== Startsida ===== */
  .home { display: flex; flex-direction: column; gap: 24px; padding-top: 20px; }
  .home-header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .home-header p { color: var(--muted); font-size: 15px; }

  .progress-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
  }
  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 18px;
  }
  .progress-label {
    font-size: 11px;
    letter-spacing: 1.2px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .progress-main { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
  .progress-main .progress-total { color: var(--muted); font-size: 18px; font-weight: 500; }
  .progress-right { text-align: right; }
  .progress-right .progress-main { color: var(--correct); }

  .progress-bar-wrap { margin-bottom: 22px; }
  .progress-bar-head {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-bar-head .progress-percent { color: var(--accent); }
  .progress-bar-track {
    height: 8px;
    background: var(--card2);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--correct));
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .progress-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .pstat { text-align: center; }
  .pstat-value {
    font-size: 22px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .pstat-icon { font-size: 18px; opacity: 0.8; }
  .pstat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .filter-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .filter-label {
    font-size: 11px;
    letter-spacing: 1.2px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
  }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active {
    background: var(--card2);
    border-color: var(--text);
    color: var(--text);
    font-weight: 500;
  }

  .cta-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .cta {
    position: relative;
    padding: 18px 24px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  .cta.cta-learn { background: var(--correct); }
  .cta.cta-learn:hover { background: #27ae60; }
  .cta.cta-review { background: var(--accent); }
  .cta.cta-review:hover { background: #3d8ee8; }
  .cta-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--wrong);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    min-width: 28px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .lessons-section h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .lessons-section .lessons-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .lessons-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }
  .lesson-card {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .lesson-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .lesson-card.done {
    background: rgba(46, 204, 113, 0.12);
    border-color: rgba(46, 204, 113, 0.45);
  }
  .lesson-card.done:hover { border-color: var(--correct); }
  .lesson-check {
    position: absolute;
    top: 8px;
    right: 8px;
    color: var(--correct);
    font-size: 14px;
  }
  .lesson-ring {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    background:
      conic-gradient(var(--correct) calc(var(--p, 0) * 1%), var(--card2) 0);
    position: relative;
  }
  .lesson-ring::after {
    content: '';
    position: absolute;
    inset: 4px;
    background: var(--card);
    border-radius: 50%;
  }
  .lesson-card.done .lesson-ring::after { background: rgba(46, 204, 113, 0.12); }
  .lesson-ring span { position: relative; z-index: 1; }
  .lesson-ring.full {
    background: var(--correct);
    color: #fff;
  }
  .lesson-ring.full::after { display: none; }
  .lesson-ring.full span { color: #fff; font-size: 18px; }
  .lesson-title { font-size: 13px; font-weight: 600; }
  .lesson-count { font-size: 11px; color: var(--muted); }

  /* Tillbaka-knapp i quiz-vyn */
  .back-home {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    margin-right: auto;
  }
  .back-home:hover { color: var(--text); border-color: var(--text); }

  @media (max-width: 720px) {
    .lessons-grid { grid-template-columns: repeat(3, 1fr); }
    .progress-stats { gap: 8px; }
    .pstat-value { font-size: 18px; }
    .cta-row { grid-template-columns: 1fr; }
    .progress-card { padding: 20px; }
    .home-header h1 { font-size: 26px; }
  }
  @media (max-width: 420px) {
    .lessons-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .option.correct {
    background: rgba(46, 204, 113, 0.15);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option.wrong {
    background: rgba(231, 76, 60, 0.15);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option.dim { opacity: 0.4; }
  .explanation {
    margin-top: 20px;
    padding: 16px;
    background: var(--card2);
    border-radius: 8px;
    font-size: 14px;
    color: var(--muted);
    border-left: 3px solid var(--accent);
    display: none;
  }
  .explanation.show { display: block; }
  .explanation em {
    display: block;
    margin-top: 8px;
    font-style: italic;
    color: #c0c4ca;
  }
  .explanation strong { color: var(--text); font-weight: 600; }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    margin-top: 16px;
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: opacity 0.15s, border-color 0.15s, background 0.15s;
  }
  .btn:hover { opacity: 0.9; }
  .btn-secondary {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: rgba(231, 76, 60, 0.16);
    color: #ffd7d3;
    border: 1px solid rgba(231, 76, 60, 0.5);
  }
  .btn.active {
    background: rgba(79, 158, 255, 0.18);
    border: 1px solid var(--accent);
    color: var(--text);
  }
  .empty-state { text-align: center; color: var(--muted); }
  .empty-state h2 { font-size: 24px; color: var(--text); margin-bottom: 10px; }
  .empty-state p { margin-bottom: 18px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header id="top-header">
    <h1>ORD-plugg</h1>
    <div class="stats">
      <span class="correct-count">✓ <span id="correct">0</span></span>
      <span class="wrong-count">✗ <span id="wrong">0</span></span>
      <span id="total">0 ord</span>
      <span id="wrongbank-stat">Felbank: 0</span>
    </div>
  </header>
  <div id="app" class="loading">Laddar ordbank...</div>
</div>

<script src="ordbank.js"></script>
<script>
  const STORAGE_KEY = 'ordplugg_progress_v3';
  const TOTAL_PARTS = 81;
  const AUTO_ADVANCE_MS = 650;

  const state = {
    correct: 0,
    wrong: 0,
    current: null,
    currentIndex: null,
    answered: false,
    selectedIdx: null,
    mode: 'all',
    part: 1,
    shownAll: [],
    shownWrong: [],
    wrongBankByPart: {},
    view: 'home',
    filter: 'all'
  };

  let autoAdvanceTimeout = null;

  const app = document.getElementById('app');
  const correctEl = document.getElementById('correct');
  const wrongEl = document.getElementById('wrong');
  const totalEl = document.getElementById('total');
  const wrongBankStatEl = document.getElementById('wrongbank-stat');

  function clearAutoAdvance() {
    if (autoAdvanceTimeout) {
      clearTimeout(autoAdvanceTimeout);
      autoAdvanceTimeout = null;
    }
  }

  function getSafePart(part) {
    const value = Number(part) || 1;
    return Math.min(TOTAL_PARTS, Math.max(1, value));
  }

  function uniqueInts(array) {
    if (!Array.isArray(array)) return [];
    return [...new Set(array.filter(Number.isInteger))];
  }

  function getPartInfo(part) {
    const total = window.ORDBANK.length;
    const baseSize = Math.floor(total / TOTAL_PARTS);
    const remainder = total % TOTAL_PARTS;
    const safePart = getSafePart(part);
    const extraBefore = Math.min(safePart - 1, remainder);
    const start = (safePart - 1) * baseSize + extraBefore;
    const size = baseSize + (safePart <= remainder ? 1 : 0);
    return { start, end: start + size, size };
  }

  function getPartIndices(part) {
    const { start, end } = getPartInfo(part);
    const arr = [];
    for (let i = start; i < end; i++) arr.push(i);
    return arr;
  }

  function getWrongBankForPart(part) {
    const key = String(getSafePart(part));
    if (!Array.isArray(state.wrongBankByPart[key])) state.wrongBankByPart[key] = [];
    return state.wrongBankByPart[key];
  }

  function saveProgress() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      correct: state.correct,
      wrong: state.wrong,
      currentIndex: state.currentIndex,
      answered: state.answered,
      selectedIdx: state.selectedIdx,
      mode: state.mode,
      part: state.part,
      shownAll: state.shownAll,
      shownWrong: state.shownWrong,
      wrongBankByPart: state.wrongBankByPart,
      view: state.view,
      filter: state.filter
    }));
  }

  function loadProgress() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (!saved) return;

      state.correct = Number(saved.correct) || 0;
      state.wrong = Number(saved.wrong) || 0;
      state.currentIndex = Number.isInteger(saved.currentIndex) ? saved.currentIndex : null;
      state.answered = !!saved.answered;
      state.selectedIdx = Number.isInteger(saved.selectedIdx) ? saved.selectedIdx : null;
      state.mode = saved.mode === 'wrong' ? 'wrong' : 'all';
      state.part = getSafePart(saved.part);
      state.shownAll = uniqueInts(saved.shownAll).filter(i => window.ORDBANK[i]);
      state.shownWrong = uniqueInts(saved.shownWrong).filter(i => window.ORDBANK[i]);
      state.wrongBankByPart = saved.wrongBankByPart && typeof saved.wrongBankByPart === 'object' ? saved.wrongBankByPart : {};
      state.view = saved.view === 'quiz' ? 'quiz' : 'home';
      state.filter = ['all', 'hp', 'other'].includes(saved.filter) ? saved.filter : 'all';

      Object.keys(state.wrongBankByPart).forEach(key => {
        state.wrongBankByPart[key] = uniqueInts(state.wrongBankByPart[key]).filter(i => window.ORDBANK[i]);
      });

      if (state.currentIndex !== null && window.ORDBANK[state.currentIndex]) {
        state.current = window.ORDBANK[state.currentIndex];
      }
    } catch (err) {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  function markShown(mode, index) {
    if (!Number.isInteger(index)) return;
    if (mode === 'wrong') {
      if (!state.shownWrong.includes(index)) state.shownWrong.push(index);
      return;
    }
    if (!state.shownAll.includes(index)) state.shownAll.push(index);
  }

  function getPartCandidates(part) {
    const indices = getPartIndices(part);
    if (state.mode === 'wrong') {
      return getWrongBankForPart(part).filter(index => indices.includes(index) && !state.shownWrong.includes(index));
    }
    return indices.filter(index => !state.shownAll.includes(index));
  }

  function getWrongBankCount() {
    return getWrongBankForPart(state.part).length;
  }

  function addToWrongBank(index) {
    const bank = getWrongBankForPart(state.part);
    if (!bank.includes(index)) bank.push(index);
  }

  function removeFromWrongBank(index) {
    Object.keys(state.wrongBankByPart).forEach(key => {
      state.wrongBankByPart[key] = getWrongBankForPart(key).filter(i => i !== index);
    });
  }

  function updateStats() {
    const info = getPartInfo(state.part);
    correctEl.textContent = state.correct;
    wrongEl.textContent = state.wrong;
    totalEl.textContent = `Del ${state.part}/${TOTAL_PARTS} · ${info.size} ord`;
    wrongBankStatEl.textContent = `Felbank i del: ${getWrongBankCount()}`;
  }

  function formatExplanation(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/> \*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  function getPartProgress(part) {
    const indices = getPartIndices(part);
    const shown = state.shownAll.filter(i => indices.includes(i)).length;
    return { shown, total: indices.length, pct: indices.length ? (shown / indices.length) * 100 : 0 };
  }

  function getTotalProgress() {
    const total = window.ORDBANK.length;
    const shown = uniqueInts(state.shownAll).filter(i => window.ORDBANK[i]).length;
    return { shown, total, pct: total ? (shown / total) * 100 : 0 };
  }

  function getCompletedPartsCount() {
    let done = 0;
    for (let p = 1; p <= TOTAL_PARTS; p++) {
      const prog = getPartProgress(p);
      if (prog.total > 0 && prog.shown >= prog.total) done++;
    }
    return done;
  }

  function getTotalWrongBankCount() {
    let total = 0;
    Object.values(state.wrongBankByPart).forEach(arr => {
      if (Array.isArray(arr)) total += arr.length;
    });
    return total;
  }

  function renderHomeView() {
    const tp = getTotalProgress();
    const completed = getCompletedPartsCount();
    const wrongTotal = getTotalWrongBankCount();
    const pctStr = tp.pct.toFixed(0);

    let lessonsHtml = '';
    for (let p = 1; p <= TOTAL_PARTS; p++) {
      const prog = getPartProgress(p);
      const pct = Math.round(prog.pct);
      const info = getPartInfo(p);
      const wordStart = info.start + 1;
      const wordEnd = info.end;
      const isDone = prog.total > 0 && prog.shown >= prog.total;

      let ringHtml;
      if (isDone) {
        ringHtml = `<div class="lesson-ring full"><span>✓</span></div>`;
      } else {
        ringHtml = `<div class="lesson-ring" style="--p:${pct}"><span>${pct}%</span></div>`;
      }

      lessonsHtml += `
        <div class="lesson-card ${isDone ? 'done' : ''}" data-part="${p}">
          ${isDone ? '<div class="lesson-check">✓</div>' : ''}
          ${ringHtml}
          <div class="lesson-title">Ord ${wordStart}–${wordEnd}</div>
          <div class="lesson-count">${prog.shown}/${prog.total}</div>
        </div>
      `;
    }

    app.className = '';
    document.getElementById('top-header').style.display = 'none';
    app.innerHTML = `
      <div class="home">
        <div class="home-header">
          <h1>Välkommen tillbaka</h1>
          <p>Fortsätt bygga ditt ordförråd</p>
        </div>

        <div class="progress-card">
          <div class="progress-top">
            <div>
              <div class="progress-label">Dina framsteg</div>
              <div class="progress-main">${tp.shown} <span class="progress-total">/ ${tp.total}</span></div>
            </div>
            <div class="progress-right">
              <div class="progress-main">${state.correct}</div>
              <div class="progress-label" style="letter-spacing:0.5px;text-transform:none;">i långtidsminnet</div>
            </div>
          </div>

          <div class="progress-bar-wrap">
            <div class="progress-bar-head">
              <span>Totalt framsteg</span>
              <span class="progress-percent">${pctStr}%</span>
            </div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:${tp.pct}%"></div>
            </div>
          </div>

          <div class="progress-stats">
            <div class="pstat">
              <div class="pstat-value"><span class="pstat-icon">📖</span>${state.correct}</div>
              <div class="pstat-label">Idag</div>
            </div>
            <div class="pstat">
              <div class="pstat-value"><span class="pstat-icon">📅</span>${tp.shown}</div>
              <div class="pstat-label">Denna vecka</div>
            </div>
            <div class="pstat">
              <div class="pstat-value"><span class="pstat-icon">🔥</span>${completed}</div>
              <div class="pstat-label">Avklarade delar</div>
            </div>
          </div>
        </div>

        <div class="filter-row">
          <div class="filter-label">Filtrera ord</div>
          <div class="chip-row">
            <button class="chip ${state.filter === 'all' ? 'active' : ''}" data-filter="all">Alla</button>
            <button class="chip ${state.filter === 'hp' ? 'active' : ''}" data-filter="hp">Högskoleprovsord</button>
            <button class="chip ${state.filter === 'other' ? 'active' : ''}" data-filter="other">Andra ord</button>
          </div>
        </div>

        <div class="cta-row">
          <button class="cta cta-learn" id="cta-learn">Lär dig nya ord</button>
          <button class="cta cta-review" id="cta-review">
            Repetera
            ${wrongTotal > 0 ? `<span class="cta-badge">${wrongTotal}</span>` : ''}
          </button>
        </div>

        <div class="lessons-section">
          <h2>Ordlektioner</h2>
          <div class="lessons-sub">${completed} av ${TOTAL_PARTS} avklarade</div>
          <div class="lessons-grid">
            ${lessonsHtml}
          </div>
        </div>
      </div>
    `;

    bindHomeEvents();
  }

  function bindHomeEvents() {
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        state.filter = chip.dataset.filter;
        saveProgress();
        renderHomeView();
      });
    });

    const learnBtn = document.getElementById('cta-learn');
    if (learnBtn) {
      learnBtn.addEventListener('click', () => {
        // Hitta första ej klara delen och börja där
        for (let p = 1; p <= TOTAL_PARTS; p++) {
          const prog = getPartProgress(p);
          if (prog.total > 0 && prog.shown < prog.total) {
            state.part = p;
            break;
          }
        }
        state.mode = 'all';
        state.view = 'quiz';
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        saveProgress();
        nextWord();
      });
    }

    const reviewBtn = document.getElementById('cta-review');
    if (reviewBtn) {
      reviewBtn.addEventListener('click', () => {
        // Hitta första delen med felord
        let foundPart = state.part;
        for (let p = 1; p <= TOTAL_PARTS; p++) {
          if (getWrongBankForPart(p).length > 0) {
            foundPart = p;
            break;
          }
        }
        state.part = foundPart;
        state.mode = 'wrong';
        state.view = 'quiz';
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        saveProgress();
        nextWord();
      });
    }

    document.querySelectorAll('.lesson-card').forEach(card => {
      card.addEventListener('click', () => {
        const p = parseInt(card.dataset.part, 10);
        if (!Number.isInteger(p)) return;
        state.part = p;
        state.mode = 'all';
        state.view = 'quiz';
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        saveProgress();
        nextWord();
      });
    });
  }

  function goHome() {
    clearAutoAdvance();
    document.removeEventListener('keydown', handleKeyNext);
    state.view = 'home';
    state.answered = false;
    state.selectedIdx = null;
    saveProgress();
    renderHomeView();
  }

  function renderPartOptions() {
    let html = '';
    for (let part = 1; part <= TOTAL_PARTS; part++) {
      const info = getPartInfo(part);
      html += `<option value="${part}" ${part === state.part ? 'selected' : ''}>Del ${part} (${info.size} ord)</option>`;
    }
    return html;
  }

  function renderToolbar() {
    return `
      <div class="toolbar">
        <button class="back-home" id="back-home">← Hem</button>
        <select id="part-select" class="part-select">${renderPartOptions()}</select>
        <button class="btn btn-secondary ${state.mode === 'all' ? 'active' : ''}" id="show-all">Alla ord</button>
        <button class="btn btn-secondary ${state.mode === 'wrong' ? 'active' : ''}" id="show-wrong">Felord</button>
        <button class="btn btn-danger" id="restart-all">Starta om</button>
      </div>
    `;
  }

  function bindToolbar() {
    const partSelect = document.getElementById('part-select');
    const showAll = document.getElementById('show-all');
    const showWrong = document.getElementById('show-wrong');
    const restartAll = document.getElementById('restart-all');
    const backHome = document.getElementById('back-home');

    if (backHome) {
      backHome.addEventListener('click', goHome);
    }

    if (partSelect) {
      partSelect.addEventListener('change', (event) => {
        state.part = getSafePart(event.target.value);
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        nextWord();
      });
    }

    if (showAll) {
      showAll.addEventListener('click', () => {
        state.mode = 'all';
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        nextWord();
      });
    }

    if (showWrong) {
      showWrong.addEventListener('click', () => {
        state.mode = 'wrong';
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        nextWord();
      });
    }

    if (restartAll) {
      restartAll.addEventListener('click', () => {
        if (!window.confirm('Vill du börja om från början på allt?')) return;
        clearAutoAdvance();
        document.removeEventListener('keydown', handleKeyNext);
        localStorage.removeItem(STORAGE_KEY);
        state.correct = 0;
        state.wrong = 0;
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        state.mode = 'all';
        state.part = 1;
        state.shownAll = [];
        state.shownWrong = [];
        state.wrongBankByPart = {};
        state.view = 'home';
        state.filter = 'all';
        renderHomeView();
      });
    }
  }

  function renderDoneState(title, description) {
    updateStats();
    app.className = '';
    document.getElementById('top-header').style.display = '';
    app.innerHTML = `
      ${renderToolbar()}
      <div class="card empty-state">
        <h2>${title}</h2>
        <p>${description}</p>
        <div class="controls" style="justify-content:center;margin-top:20px;">
          <button class="btn" id="done-home">← Tillbaka till hem</button>
        </div>
      </div>
    `;
    bindToolbar();
    const doneHome = document.getElementById('done-home');
    if (doneHome) doneHome.addEventListener('click', goHome);
    saveProgress();
  }

  function applyAnsweredState() {
    if (!state.answered || state.currentIndex === null) return;

    const q = state.current;
    const buttons = document.querySelectorAll('.option');
    const wasCorrect = state.selectedIdx === q.a;

    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.a) btn.classList.add('correct');
      else if (i === state.selectedIdx && !wasCorrect) btn.classList.add('wrong');
      else btn.classList.add('dim');
    });

    document.getElementById('explanation').classList.add('show');
    document.getElementById('skip').style.display = 'none';

    if (wasCorrect) {
      document.getElementById('next').style.display = 'none';
      clearAutoAdvance();
      autoAdvanceTimeout = setTimeout(() => {
        autoAdvanceTimeout = null;
        nextWord();
      }, AUTO_ADVANCE_MS);
    } else {
      document.getElementById('next').style.display = 'block';
      document.addEventListener('keydown', handleKeyNext);
    }
  }

  function render() {
    updateStats();
    const q = state.current;

    app.className = '';
    document.getElementById('top-header').style.display = '';
    app.innerHTML = `
      ${renderToolbar()}
      <div class="card">
        <div class="word">${q.q}</div>
        <div class="options">
          ${q.o.map((opt, i) => `<button class="option" data-idx="${i}">${opt}</button>`).join('')}
        </div>
        <div class="explanation" id="explanation">${formatExplanation(q.e)}</div>
      </div>
      <div class="controls">
        <button class="btn btn-secondary" id="skip">Hoppa över</button>
        <button class="btn" id="next" style="display:none">Nästa ord →</button>
      </div>
    `;

    bindToolbar();
    document.querySelectorAll('.option').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx, 10)));
    });
    document.getElementById('skip').addEventListener('click', nextWord);
    document.getElementById('next').addEventListener('click', nextWord);
    applyAnsweredState();
  }

  function handleAnswer(idx) {
    if (state.answered || state.currentIndex === null) return;

    clearAutoAdvance();
    state.answered = true;
    state.selectedIdx = idx;

    const q = state.current;
    const buttons = document.querySelectorAll('.option');
    const wasCorrect = idx === q.a;

    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.a) btn.classList.add('correct');
      else if (i === idx && !wasCorrect) btn.classList.add('wrong');
      else btn.classList.add('dim');
    });

    if (wasCorrect) {
      state.correct++;
      removeFromWrongBank(state.currentIndex);
    } else {
      state.wrong++;
      addToWrongBank(state.currentIndex);
    }

    updateStats();
    document.getElementById('explanation').classList.add('show');
    document.getElementById('skip').style.display = 'none';
    saveProgress();

    if (wasCorrect) {
      document.getElementById('next').style.display = 'none';
      autoAdvanceTimeout = setTimeout(() => {
        autoAdvanceTimeout = null;
        nextWord();
      }, AUTO_ADVANCE_MS);
      return;
    }

    document.getElementById('next').style.display = 'block';
    document.addEventListener('keydown', handleKeyNext);
  }

  function handleKeyNext(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      document.removeEventListener('keydown', handleKeyNext);
      nextWord();
    }
  }

  function nextWord() {
    clearAutoAdvance();
    document.removeEventListener('keydown', handleKeyNext);
    state.answered = false;
    state.selectedIdx = null;

    const candidates = getPartCandidates(state.part);
    if (!candidates.length) {
      state.current = null;
      state.currentIndex = null;

      if (state.mode === 'wrong') {
        renderDoneState(
          `Inga fler felord i del ${state.part}`,
          'Felorden är nu uppdelade på samma 81 delar. Alla felord i den här delen har redan visats eller tagits bort från den här delens felbank.'
        );
      } else {
        renderDoneState(
          `Del ${state.part} är klar`,
          'Alla ord i den här delen har redan visats en gång. Inget ord upprepas igen förrän du trycker på Starta om.'
        );
      }
      return;
    }

    const nextIndex = candidates[Math.floor(Math.random() * candidates.length)];
    state.currentIndex = nextIndex;
    state.current = window.ORDBANK[nextIndex];
    markShown(state.mode, nextIndex);
    saveProgress();
    render();
  }

  if (window.ORDBANK && window.ORDBANK.length) {
    loadProgress();

    if (state.currentIndex !== null && state.current) {
      markShown(state.mode, state.currentIndex);
    }

    const validCurrent = state.currentIndex !== null && getPartIndices(state.part).includes(state.currentIndex);
    if (!validCurrent) {
      state.current = null;
      state.currentIndex = null;
      state.answered = false;
      state.selectedIdx = null;
    }

    if (state.view === 'quiz') {
      if (state.current) render();
      else nextWord();
    } else {
      renderHomeView();
    }
  } else {
    app.textContent = 'Kunde inte ladda ordbank. Kontrollera att ordbank.js finns i samma mapp.';
  }
</script>
