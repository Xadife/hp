<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORD-plugg · Högskoleprovet</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #232831;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --accent: #4f9eff;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --border: #2c3138;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.5;
  }
  .container { max-width: 760px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  h1 { font-size: 20px; font-weight: 600; }
  .stats {
    font-size: 14px;
    color: var(--muted);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 12px;
  }
  .correct-count { color: var(--correct); }
  .wrong-count { color: var(--wrong); }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .part-select {
    min-width: 190px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .word {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: #2a2f38;
  }
  .option:disabled { cursor: default; }
  .option.correct {
    background: rgba(46, 204, 113, 0.15);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option.wrong {
    background: rgba(231, 76, 60, 0.15);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option.dim { opacity: 0.4; }
  .explanation {
    margin-top: 20px;
    padding: 16px;
    background: var(--card2);
    border-radius: 8px;
    font-size: 14px;
    color: var(--muted);
    border-left: 3px solid var(--accent);
    display: none;
  }
  .explanation.show { display: block; }
  .explanation em {
    display: block;
    margin-top: 8px;
    font-style: italic;
    color: #c0c4ca;
  }
  .explanation strong { color: var(--text); font-weight: 600; }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    margin-top: 16px;
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: opacity 0.15s, border-color 0.15s, background 0.15s;
  }
  .btn:hover { opacity: 0.9; }
  .btn-secondary {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-danger {
    background: rgba(231, 76, 60, 0.16);
    color: #ffd7d3;
    border: 1px solid rgba(231, 76, 60, 0.5);
  }
  .btn.active {
    background: rgba(79, 158, 255, 0.18);
    border: 1px solid var(--accent);
    color: var(--text);
  }
  .empty-state { text-align: center; color: var(--muted); }
  .empty-state h2 { font-size: 24px; color: var(--text); margin-bottom: 10px; }
  .empty-state p { margin-bottom: 18px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>ORD-plugg</h1>
    <div class="stats">
      <span class="correct-count">✓ <span id="correct">0</span></span>
      <span class="wrong-count">✗ <span id="wrong">0</span></span>
      <span id="total">0 ord</span>
      <span id="wrongbank-stat">Felbank: 0</span>
    </div>
  </header>
  <div id="app" class="loading">Laddar ordbank...</div>
</div>

<script src="ordbank.js"></script>
<script>
  const STORAGE_KEY = 'ordplugg_progress_v3';
  const TOTAL_PARTS = 81;
  const AUTO_ADVANCE_MS = 650;

  const state = {
    correct: 0,
    wrong: 0,
    current: null,
    currentIndex: null,
    answered: false,
    selectedIdx: null,
    mode: 'all',
    part: 1,
    shownAll: [],
    shownWrong: [],
    wrongBankByPart: {}
  };

  let autoAdvanceTimeout = null;

  const app = document.getElementById('app');
  const correctEl = document.getElementById('correct');
  const wrongEl = document.getElementById('wrong');
  const totalEl = document.getElementById('total');
  const wrongBankStatEl = document.getElementById('wrongbank-stat');

  function clearAutoAdvance() {
    if (autoAdvanceTimeout) {
      clearTimeout(autoAdvanceTimeout);
      autoAdvanceTimeout = null;
    }
  }

  function getSafePart(part) {
    const value = Number(part) || 1;
    return Math.min(TOTAL_PARTS, Math.max(1, value));
  }

  function uniqueInts(array) {
    if (!Array.isArray(array)) return [];
    return [...new Set(array.filter(Number.isInteger))];
  }

  function getPartInfo(part) {
    const total = window.ORDBANK.length;
    const baseSize = Math.floor(total / TOTAL_PARTS);
    const remainder = total % TOTAL_PARTS;
    const safePart = getSafePart(part);
    const extraBefore = Math.min(safePart - 1, remainder);
    const start = (safePart - 1) * baseSize + extraBefore;
    const size = baseSize + (safePart <= remainder ? 1 : 0);
    return { start, end: start + size, size };
  }

  function getPartIndices(part) {
    const { start, end } = getPartInfo(part);
    const arr = [];
    for (let i = start; i < end; i++) arr.push(i);
    return arr;
  }

  function getWrongBankForPart(part) {
    const key = String(getSafePart(part));
    if (!Array.isArray(state.wrongBankByPart[key])) state.wrongBankByPart[key] = [];
    return state.wrongBankByPart[key];
  }

  function saveProgress() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      correct: state.correct,
      wrong: state.wrong,
      currentIndex: state.currentIndex,
      answered: state.answered,
      selectedIdx: state.selectedIdx,
      mode: state.mode,
      part: state.part,
      shownAll: state.shownAll,
      shownWrong: state.shownWrong,
      wrongBankByPart: state.wrongBankByPart
    }));
  }

  function loadProgress() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (!saved) return;

      state.correct = Number(saved.correct) || 0;
      state.wrong = Number(saved.wrong) || 0;
      state.currentIndex = Number.isInteger(saved.currentIndex) ? saved.currentIndex : null;
      state.answered = !!saved.answered;
      state.selectedIdx = Number.isInteger(saved.selectedIdx) ? saved.selectedIdx : null;
      state.mode = saved.mode === 'wrong' ? 'wrong' : 'all';
      state.part = getSafePart(saved.part);
      state.shownAll = uniqueInts(saved.shownAll).filter(i => window.ORDBANK[i]);
      state.shownWrong = uniqueInts(saved.shownWrong).filter(i => window.ORDBANK[i]);
      state.wrongBankByPart = saved.wrongBankByPart && typeof saved.wrongBankByPart === 'object' ? saved.wrongBankByPart : {};

      Object.keys(state.wrongBankByPart).forEach(key => {
        state.wrongBankByPart[key] = uniqueInts(state.wrongBankByPart[key]).filter(i => window.ORDBANK[i]);
      });

      if (state.currentIndex !== null && window.ORDBANK[state.currentIndex]) {
        state.current = window.ORDBANK[state.currentIndex];
      }
    } catch (err) {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  function markShown(mode, index) {
    if (!Number.isInteger(index)) return;
    if (mode === 'wrong') {
      if (!state.shownWrong.includes(index)) state.shownWrong.push(index);
      return;
    }
    if (!state.shownAll.includes(index)) state.shownAll.push(index);
  }

  function getPartCandidates(part) {
    const indices = getPartIndices(part);
    if (state.mode === 'wrong') {
      return getWrongBankForPart(part).filter(index => indices.includes(index) && !state.shownWrong.includes(index));
    }
    return indices.filter(index => !state.shownAll.includes(index));
  }

  function getWrongBankCount() {
    return getWrongBankForPart(state.part).length;
  }

  function addToWrongBank(index) {
    const bank = getWrongBankForPart(state.part);
    if (!bank.includes(index)) bank.push(index);
  }

  function removeFromWrongBank(index) {
    Object.keys(state.wrongBankByPart).forEach(key => {
      state.wrongBankByPart[key] = getWrongBankForPart(key).filter(i => i !== index);
    });
  }

  function updateStats() {
    const info = getPartInfo(state.part);
    correctEl.textContent = state.correct;
    wrongEl.textContent = state.wrong;
    totalEl.textContent = `Del ${state.part}/${TOTAL_PARTS} · ${info.size} ord`;
    wrongBankStatEl.textContent = `Felbank i del: ${getWrongBankCount()}`;
  }

  function formatExplanation(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/> \*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  function renderPartOptions() {
    let html = '';
    for (let part = 1; part <= TOTAL_PARTS; part++) {
      const info = getPartInfo(part);
      html += `<option value="${part}" ${part === state.part ? 'selected' : ''}>Del ${part} (${info.size} ord)</option>`;
    }
    return html;
  }

  function renderToolbar() {
    return `
      <div class="toolbar">
        <select id="part-select" class="part-select">${renderPartOptions()}</select>
        <button class="btn btn-secondary ${state.mode === 'all' ? 'active' : ''}" id="show-all">Alla ord</button>
        <button class="btn btn-secondary ${state.mode === 'wrong' ? 'active' : ''}" id="show-wrong">Felord</button>
        <button class="btn btn-danger" id="restart-all">Starta om</button>
      </div>
    `;
  }

  function bindToolbar() {
    const partSelect = document.getElementById('part-select');
    const showAll = document.getElementById('show-all');
    const showWrong = document.getElementById('show-wrong');
    const restartAll = document.getElementById('restart-all');

    if (partSelect) {
      partSelect.addEventListener('change', (event) => {
        state.part = getSafePart(event.target.value);
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        nextWord();
      });
    }

    if (showAll) {
      showAll.addEventListener('click', () => {
        state.mode = 'all';
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        nextWord();
      });
    }

    if (showWrong) {
      showWrong.addEventListener('click', () => {
        state.mode = 'wrong';
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        nextWord();
      });
    }

    if (restartAll) {
      restartAll.addEventListener('click', () => {
        if (!window.confirm('Vill du börja om från början på allt?')) return;
        clearAutoAdvance();
        document.removeEventListener('keydown', handleKeyNext);
        localStorage.removeItem(STORAGE_KEY);
        state.correct = 0;
        state.wrong = 0;
        state.current = null;
        state.currentIndex = null;
        state.answered = false;
        state.selectedIdx = null;
        state.mode = 'all';
        state.part = 1;
        state.shownAll = [];
        state.shownWrong = [];
        state.wrongBankByPart = {};
        nextWord();
      });
    }
  }

  function renderDoneState(title, description) {
    updateStats();
    app.className = '';
    app.innerHTML = `
      ${renderToolbar()}
      <div class="card empty-state">
        <h2>${title}</h2>
        <p>${description}</p>
      </div>
    `;
    bindToolbar();
    saveProgress();
  }

  function applyAnsweredState() {
    if (!state.answered || state.currentIndex === null) return;

    const q = state.current;
    const buttons = document.querySelectorAll('.option');
    const wasCorrect = state.selectedIdx === q.a;

    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.a) btn.classList.add('correct');
      else if (i === state.selectedIdx && !wasCorrect) btn.classList.add('wrong');
      else btn.classList.add('dim');
    });

    document.getElementById('explanation').classList.add('show');
    document.getElementById('skip').style.display = 'none';

    if (wasCorrect) {
      document.getElementById('next').style.display = 'none';
      clearAutoAdvance();
      autoAdvanceTimeout = setTimeout(() => {
        autoAdvanceTimeout = null;
        nextWord();
      }, AUTO_ADVANCE_MS);
    } else {
      document.getElementById('next').style.display = 'block';
      document.addEventListener('keydown', handleKeyNext);
    }
  }

  function render() {
    updateStats();
    const q = state.current;

    app.className = '';
    app.innerHTML = `
      ${renderToolbar()}
      <div class="card">
        <div class="word">${q.q}</div>
        <div class="options">
          ${q.o.map((opt, i) => `<button class="option" data-idx="${i}">${opt}</button>`).join('')}
        </div>
        <div class="explanation" id="explanation">${formatExplanation(q.e)}</div>
      </div>
      <div class="controls">
        <button class="btn btn-secondary" id="skip">Hoppa över</button>
        <button class="btn" id="next" style="display:none">Nästa ord →</button>
      </div>
    `;

    bindToolbar();
    document.querySelectorAll('.option').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx, 10)));
    });
    document.getElementById('skip').addEventListener('click', nextWord);
    document.getElementById('next').addEventListener('click', nextWord);
    applyAnsweredState();
  }

  function handleAnswer(idx) {
    if (state.answered || state.currentIndex === null) return;

    clearAutoAdvance();
    state.answered = true;
    state.selectedIdx = idx;

    const q = state.current;
    const buttons = document.querySelectorAll('.option');
    const wasCorrect = idx === q.a;

    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.a) btn.classList.add('correct');
      else if (i === idx && !wasCorrect) btn.classList.add('wrong');
      else btn.classList.add('dim');
    });

    if (wasCorrect) {
      state.correct++;
      removeFromWrongBank(state.currentIndex);
    } else {
      state.wrong++;
      addToWrongBank(state.currentIndex);
    }

    updateStats();
    document.getElementById('explanation').classList.add('show');
    document.getElementById('skip').style.display = 'none';
    saveProgress();

    if (wasCorrect) {
      document.getElementById('next').style.display = 'none';
      autoAdvanceTimeout = setTimeout(() => {
        autoAdvanceTimeout = null;
        nextWord();
      }, AUTO_ADVANCE_MS);
      return;
    }

    document.getElementById('next').style.display = 'block';
    document.addEventListener('keydown', handleKeyNext);
  }

  function handleKeyNext(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      document.removeEventListener('keydown', handleKeyNext);
      nextWord();
    }
  }

  function nextWord() {
    clearAutoAdvance();
    document.removeEventListener('keydown', handleKeyNext);
    state.answered = false;
    state.selectedIdx = null;

    const candidates = getPartCandidates(state.part);
    if (!candidates.length) {
      state.current = null;
      state.currentIndex = null;

      if (state.mode === 'wrong') {
        renderDoneState(
          `Inga fler felord i del ${state.part}`,
          'Felorden är nu uppdelade på samma 81 delar. Alla felord i den här delen har redan visats eller tagits bort från den här delens felbank.'
        );
      } else {
        renderDoneState(
          `Del ${state.part} är klar`,
          'Alla ord i den här delen har redan visats en gång. Inget ord upprepas igen förrän du trycker på Starta om.'
        );
      }
      return;
    }

    const nextIndex = candidates[Math.floor(Math.random() * candidates.length)];
    state.currentIndex = nextIndex;
    state.current = window.ORDBANK[nextIndex];
    markShown(state.mode, nextIndex);
    saveProgress();
    render();
  }

  if (window.ORDBANK && window.ORDBANK.length) {
    loadProgress();

    if (state.currentIndex !== null && state.current) {
      markShown(state.mode, state.currentIndex);
    }

    const validCurrent = state.currentIndex !== null && getPartIndices(state.part).includes(state.currentIndex);
    if (!validCurrent) {
      state.current = null;
      state.currentIndex = null;
      state.answered = false;
      state.selectedIdx = null;
    }

    if (state.current) render();
    else nextWord();
  } else {
    app.textContent = 'Kunde inte ladda ordbank. Kontrollera att ordbank.js finns i samma mapp.';
  }
</script>
</body>
</html>
